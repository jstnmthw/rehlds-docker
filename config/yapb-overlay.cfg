// =============================================================================
//  YaPB — performance / behaviour overlay
//  (cstrike/addons/yapb/conf/yapb-overlay.cfg)
// =============================================================================
//  A small, curated companion to YaPB's stock yapb.cfg. The stock file is 700+
//  lines, ships INSIDE the YaPB release archive, and is replaced wholesale on
//  every YaPB version bump — so edits made directly to it silently vanish on
//  the next image rebuild. This overlay is kept separate so it survives that.
//
//  How it loads: the build appends `exec addons/yapb/conf/yapb-overlay.cfg`
//  to the end of yapb.cfg. YaPB re-execs yapb.cfg on every changelevel, so this
//  overlay is re-applied right after the stock defaults each map — its values
//  always win, and they persist across map changes.
//
//  This file is seeded into the volume once and then never overwritten, so
//  edits you make here persist across container restarts and updates.
//
//  Tuned for a small CS 1.6 server (~6 bots) on a modern multi-core host with
//  ample spare CPU and RAM, so a few defaults are raised for smoother, snappier
//  bots. Deliberately moderate, not maxed. Delete any line to restore stock.
// =============================================================================

// How often the bot AI loop runs, per second.   stock 26.0  |  max 90.0
// 26 is throttled for weak servers; 60 gives smoother aim, tracking and
// reaction timing without going to the 90 ceiling.
yb_think_fps "60.0"

// Floyd-Warshall pathfinding memory cap, in MB.  stock 6  |  max 32
// Under the cap, bots use precomputed (effectively instant) pathfinding; over
// it they fall back to slower per-query Dijkstra. 32 keeps large maps on the
// fast path — the only cost is RAM, which a modern host has to spare.
yb_path_floyd_memory_limit "32"

// Post-smooth A* paths.                          stock 0  |  1 = on
// Removes zig-zags from bot routes for less robotic movement. Trivial CPU cost
// on this hardware.
yb_path_astar_post_smooth "1"

// FPS cap for the one-time map graph analyzer.   stock 30.0  |  max 99.0
// Only runs when a map has no graph yet; 60 finishes that first-load analysis
// faster. No effect on normal gameplay.
yb_graph_analyze_fps "60.0"

