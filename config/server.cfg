// =============================================================================
//  Counter-Strike 1.6  —  server.cfg  (ReHLDS edition)
// =============================================================================
//  This file is a TEMPLATE. On every container start, the entrypoint copies
//  it to  cstrike/server.cfg  and appends a block of environment-driven
//  settings (hostname, rcon_password, sv_lan, sv_region, bot cvars, ...).
//
//  Do NOT edit cstrike/server.cfg directly inside the container — it is
//  regenerated and your changes are lost. Instead:
//    * change runtime values in the .env file, or
//    * put your own custom cvars in  cstrike/serverextra.cfg  (a seeded file
//      that is exec'd last and is never overwritten).
// =============================================================================

// --- Basic server settings ---------------------------------------------------
// hostname / rcon_password / sv_password / sv_lan / sv_region are appended
// from the container environment — see the generated block at the bottom.
sv_contact ""
pausable 0
sv_cheats 0
sv_allowupload 1
sv_allowdownload 1
sv_voiceenable 1
mp_consistency 1

// Fast downloads (QoL): serve your maps/models from an HTTP mirror instead of
// the slow in-game UDP download. Set SV_DOWNLOADURL in .env — the entrypoint
// appends sv_downloadurl to the generated block below. Empty = clients fall
// back to the in-game UDP download.

// --- ReHLDS flood protection -------------------------------------------------
//  One of the things ReHLDS brings: it rate-limits the abusive packet types
//  that the classic GoldSrc A2S/stringcmd floods exploit, so a flood no longer
//  pegs a CPU core. These are sane starting values — raise them only if
//  legitimate clients are being limited (watch the console log).
sv_rehlds_stringcmdrate_max_avg 80
sv_rehlds_stringcmdrate_max_burst 400
sv_rehlds_movecmdrate_max_avg 400
sv_rehlds_movecmdrate_max_burst 2500
sv_rehlds_maxclients_from_single_ip 5

// --- A2S query rate limiting -------------------------------------------------
//  Caps how often a single IP can pull server-info ("TSource Engine Query" /
//  A2S_INFO) replies — the specific flood that motivated moving to ReHLDS.
//  These are the engine defaults, stated explicitly so the limit is visible
//  and tunable: per-IP queries/sec, the window it is measured over, and a
//  global server-wide cap.
sv_max_queries_sec 3.0
sv_max_queries_window 30
sv_max_queries_sec_global 60

// --- ReHLDS hardening / behaviour --------------------------------------------
sv_rehlds_send_mapcycle 0
sv_rehlds_hull_centering 0
sv_rehlds_local_gametime 0
sv_filterban 1

// --- RCON brute-force protection ---------------------------------------------
sv_rcon_minfailures 5
sv_rcon_maxfailures 10
sv_rcon_minfailuretime 30
sv_rcon_banpenalty 60

// --- Network rates -----------------------------------------------------------
//  Modernised for present-day broadband. The old 25000 maxrate throttled the
//  high tick/update rates this server already runs (+sys_ticrate 1000,
//  sv_maxupdaterate 102) — raising it lets good connections actually receive
//  the smoother feed the server generates. minrate / minupdaterate set a sane
//  floor so no client gets a choppy low-rate stream. Each client still picks
//  its own rate within these bounds. Set sv_maxrate 0 for a fully uncapped rate.
sv_minrate 25000
sv_maxrate 100000
sv_minupdaterate 60
sv_maxupdaterate 102
sv_unlag 1
sv_maxunlag 0.5
sv_timeout 60
decalfrequency 30

// --- Gameplay (Counter-Strike) ----------------------------------------------
mp_timelimit 30
mp_maxrounds 0
mp_winlimit 0
mp_freezetime 5
mp_buytime 0.5
mp_c4timer 35
mp_startmoney 800
mp_friendlyfire 0
mp_footsteps 1
mp_flashlight 1
mp_autokick 0
mp_autoteambalance 1
mp_limitteams 2
mp_tkpunish 1
mp_hostagepenalty 5
mp_chattime 10
mp_forcechasecam 0
mp_allowspectators 1

// --- Logging (kept on; Docker captures stdout) -------------------------------
log on
mp_logfile 1
mp_logmessages 1
mp_logdetail 3
sv_logbans 1
sv_log_onefile 0

// --- Map cycle ---------------------------------------------------------------
mapchangecfgfile ""

// The container appends environment-driven settings below this line, and
// finishes with `exec serverextra.cfg` for your own custom cvars.
