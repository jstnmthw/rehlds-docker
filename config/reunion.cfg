# =============================================================================
#  Reunion configuration  (cstrike/reunion.cfg)
# =============================================================================
#  Reunion lets protocol 47/48 non-Steam clients connect to a ReHLDS server.
#
#  This is a TEMPLATE used ONLY when REUNION_ENABLED=true. On start,
#  apply-overlay.sh renders it to cstrike/reunion.cfg and fills in:
#    * SteamIdHashSalt  — from REUNION_HASH_SALT, or an auto-generated value
#                         persisted at /data/.reunion-salt
#    * cid_NoSteam47/48 — from REUNION_NOSTEAM_CID (default 3 = allow them)
# =============================================================================

# --- AUTHID MANAGEMENT -------------------------------------------------------
# ClientID types: 1=real STEAM_, 2=real VALVE_, 3=STEAM_ by IP, 4=VALVE_ by IP,
#                 5=reject, 7=HLTV.

cid_Steam = 1
cid_SteamPending = 5
cid_HLTV = 5
cid_NoSteam47 = 3
cid_NoSteam48 = 3
cid_RevEmu = 1
cid_RevEmu2013 = 1
cid_SC2009 = 1
cid_OldRevEmu = 1
cid_SteamEmu = 1
cid_AVSMP = 1
cid_Setti = 3
cid_SXEI = 1

# --- AUTH SETTINGS -----------------------------------------------------------
# AuthVersion 3 (recommended) REQUIRES a non-empty SteamIdHashSalt; the
# container fills one in automatically.
AuthVersion = 3
SteamIdHashSalt =
SC2009_RevCompatMode = 1
EnableSXEIdGeneration = 0
EnableGenPrefix2 = 0
HLTVExcept_IP = 127.0.0.1

# --- SERVER QUERIES MANAGEMENT ----------------------------------------------
# Server-query flood protection — a second layer on top of ReHLDS's own
# engine-level limits.
ServerInfoAnswerType = 0
FixBuggedQuery = 1
EnableQueryLimiter = 1
QueryFloodBanLevel = 400
QueryFloodBanTime = 10

[QueryLimiterExceptIP]
#127.0.0.1

AllowSplitPackets = 0
IDClientsLimit = 1

# --- OTHER -------------------------------------------------------------------
# LoggingMode: 0=none, 1=console, 2=files, 3=both
LoggingMode = 1
