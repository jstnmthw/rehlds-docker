; =============================================================================
;  Metamod plugin list  —  cstrike/addons/metamod/plugins.ini
; =============================================================================
;  This is a TEMPLATE. On every container start, the entrypoint regenerates
;  cstrike/addons/metamod/plugins.ini from it:
;
;    * the line tagged @reunion@ is included only when REUNION_ENABLED=true
;    * the line tagged @yapb@    is included only when BOTS_ENABLED=true
;
;  Editing the live file inside the container has no effect — change the
;  REUNION_ENABLED / BOTS_ENABLED variables in your .env instead.
;
;  Format:  <os> <path-relative-to-gamedir>
; =============================================================================

; Reunion — lets non-Steam (protocol 47/48) clients connect. Loaded first.
;@reunion@ linux addons/reunion/reunion_mm_i386.so

; AMX Mod X — plugin platform (always enabled).
linux addons/amxmodx/dlls/amxmodx_mm_i386.so

; YaPB — bots.
;@yapb@ linux addons/yapb/bin/yapb.so
