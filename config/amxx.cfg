// =============================================================================
//  AMX Mod X — core configuration  (cstrike/addons/amxmodx/configs/amxx.cfg)
// =============================================================================
//  This file is SEEDED once into the serverfiles on first install and is then
//  never overwritten — so edits you make inside the container survive updates
//  and restarts. (Re-seed it by deleting the live file and restarting.)
//
//  amxx.cfg is exec'd by AMX Mod X after the map's server.cfg.
// =============================================================================

// --- Admin / access ----------------------------------------------------------
// Admins are defined in configs/users.ini (also a seeded, persistent file).
amx_password_field "_pw"        // setinfo key clients use to send their password
amx_default_access ""           // access flags granted to every player
amx_mode 1                      // 1 = kick players when no admin is online to vouch (0 = off)

// --- Reserved slots ----------------------------------------------------------
amx_reservation 0               // number of slots reserved for admins
amx_hideslots 0                 // 1 = hide reserved slots from the server browser

// --- Activity display --------------------------------------------------------
// How admin actions are announced: 2 = show admin name to everyone.
amx_show_activity 2

// --- Idle / language ---------------------------------------------------------
amx_language "en"               // default server language
amx_client_languages 1          // 1 = let clients see messages in their own language

// --- Scrolling / info messages (plugins: scrollmsg, imessage) ---------------
amx_scrollmsg "Powered by ReHLDS + AMX Mod X" 600
amx_imessagesnum 2
amx_imessage "Welcome to %hostname%" "0 255 0"
amx_imessage "This server runs AMX Mod X" "0 100 200"
amx_freq_imessage 180

// --- Vote settings -----------------------------------------------------------
amx_vote_answers 1              // announce who voted for what
amx_vote_delay 60               // seconds between votes
amx_vote_time 10                // seconds a vote stays open
amx_votekick_ratio 0.40
amx_voteban_ratio 0.40
amx_votemap_ratio 0.40

// --- Misc --------------------------------------------------------------------
amx_flood_time 0.75             // anti chat-flood: min seconds between messages
amx_chat_time 0.50
